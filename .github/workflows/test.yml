# .github/workflows/test.yml

name: Test

on:
  workflow_dispatch:
    inputs:
      geeting_message:
        description: 'Geeting Message'
        required: true
        default: 'Hello World'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v2
      - name: Set up Go
        uses: actions/setup-go@v2
        with:
          go-version: 1.17
      - name: Test
        run: go run cmd/main.go
