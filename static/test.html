<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Quản lý Thời khóa biểu</title>
    <script src="https://unpkg.com/vue@3/dist/vue.global.js"></script>
</head>
<body>
    <div id="app">
        <h1>Quản lý Thời khóa biểu</h1>
        
        <generic-datasheet 
            :labels="scheduleColumns" 
            :datas="scheduleData" 
            @sync="handleSyncToServer">
        </generic-datasheet>
    </div>

    <script src="datasheet.js"></script>

    <script>
        const { createApp, ref } = Vue;

        const app = createApp({
            setup() {
                // Cấu hình các cột (labels) [cite: 5, 10]
                const scheduleColumns = ref([
                    { key: 'subject', title: 'Tên Môn Học', type: 'text' },
                    { key: 'teacher', title: 'Giáo viên', type: 'text' },
                    { key: 'date', title: 'Ngày học', type: 'date' },
                    { key: 'time', title: 'Thời gian', type: 'time' }
                ]);

                // Dữ liệu mô phỏng (Sau này lấy từ Golang Server qua Fetch API) [cite: 6]
                const scheduleData = ref([
                    { id: 1, subject: 'Toán cao cấp', teacher: 'Nguyễn Văn A', date: '2026-06-28', time: '07:30' },
                    { id: 2, subject: 'Lập trình Go', teacher: 'Trần Thị B', date: '2026-06-29', time: '09:00' }
                ]);

                // Hàm xử lý đồng bộ [cite: 14]
                const handleSyncToServer = (updatedData) => {
                    console.log('Dữ liệu gửi lên Golang:', updatedData);
                    // Dùng fetch() gửi lên server Go ở đây
                    /*
                    fetch('/api/sync-schedule', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(updatedData)
                    })
                    .then(res => res.json())
                    .then(data => alert('Đồng bộ thành công!'))
                    .catch(err => console.error('Lỗi:', err));
                    */
                    alert('Kiểm tra console để xem dữ liệu chuẩn bị gửi!');
                };

                return {
                    scheduleColumns,
                    scheduleData,
                    handleSyncToServer
                };
            }
        });

        // Đăng ký component toàn cục để dùng trong HTML
        app.component('generic-datasheet', DataSheet);

        // Chạy ứng dụng
        app.mount('#app');
    </script>
</body>
</html>
