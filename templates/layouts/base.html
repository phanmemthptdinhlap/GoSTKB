<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ block "title" . }}Hỗ trợ xếp thời khóa biểu{{ end }}</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
    {{ block "head" . }}{{ end }}
</head>
<body>
    <header class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container">
            <a class="navbar-brand" href="/">Hỗ trợ xếp thời khóa biểu</a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav">
                    <li class="nav-item">
                        <a class="nav-link" href="/giaovien">Giáo viên</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="/lophoc">Lớp học</a>
                    </li>
                </ul>
            </div>
        </div>
    </header>

    <main class="container mt-4">
        {{ block "content" . }}{{ end }}
    </main>

    <footer class="container mt-5">
        <hr>
        <p class="text-center">© 2025 Hỗ trợ xếp thời khóa biểu</p>
    </footer>

    <script src="/static/js/bootstrap.min.js"></script>
    {{ block "scripts" . }}{{ end }}
</body>
</html>
