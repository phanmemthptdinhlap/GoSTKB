{{define "content"}}
<div id="app">
  <h1>Phân bổ tiết dạy theo tuần</h1>
  
  <div class="mb-3 d-flex align-items-center">
    <label for="week_select" class="fw-bold me-2">Tuần học:</label>
    <select 
      id="week_select"
      v-model.number="week"
      @change="fetchData"
      class="form-select form-select-sm"
      style="width: 150px;">
      <option v-for="w in 52" :key="w" :value="w" v-text="'Tuần ' + w"></option>
    </select>
  </div>

  <datagrid
    ref="gridRef"
    :labels="scheduleColumns" 
    :datas="scheduleData" 
    @sync="handleSyncToServer">
  </datagrid>

  <div class="mb-3 text-end mt-3">
    <!-- An toàn với Golang: Xử lý chuỗi bằng v-text trực tiếp trên thẻ button -->
    <button
      class="btn btn-primary"
      :disabled="!gridRef?.hasChanges"
      @click="handleSyncToServer"
      v-text="'Đồng bộ ' + (gridRef?.changedPayload?.length || 0) + ' thay đổi'"
    ></button>
  </div>
</div>

<!-- Cần đảm bảo đường dẫn tới tệp datagrid.js là chính xác tuyệt đối -->
<script src="/static/datagrid.js"></script>

<script>
  const { createApp, ref, onMounted } = Vue;

  const app = createApp({
    setup() {
      // 1. Khởi tạo các biến phản ứng
      const gridRef = ref(null);
      const week = ref(0); // Mặc định chọn tuần 0
      const scheduleData = ref([]); // Bắt buộc khởi tạo mảng rỗng để tránh lỗi length

      const scheduleColumns = ref([]);

      const fetchTuan = async () => {
        try {
          const response = await fetch('/api/chitiet/tuan');
          if (response.ok) {
            const tuan = await response.json() || 0;
            week.value = parseInt(tuan);
          }
        } catch (error) {
          console.error("Lỗi lấy tuần mặc định:", error);
        }
      };

      const fetchMonHoc = async () => {
        try {
          const response = await fetch('/api/monhoc');
          if (response.ok) {
            const monhocs = await response.json() || [];
            var Mon = monhocs.map(m =>({
              key: m.id,
              title: m.ten_mon
            }));
            scheduleColumns.value=[
              { key: 'ten_lop', title: 'Tên Lớp', type: 'text' },
              { key: 'mon_hoc', title: 'Môn học', type: 'cell', valuekey: 'so_tiet', cells: Mon },
            ];
          }
        } catch (error) {
          console.error("Lỗi lấy danh sách môn học:", error);
        }
      };
       
      // 2. Logic gọi dữ liệu theo tuần
      const fetchData = async () => {
        try{
          const response = await fetch('/api/chitiet/'+week.value);
          if (response.ok) {
            const result = await response.json();
            // Gán dữ liệu server vào datas. Component datasheet sẽ tự động map thêm action 'none'
            scheduleData.value = result || [];
          } else {
            alert("Lỗi khi tải dữ liệu từ máy chủ");
          }
        } catch (error) {
          console.error("Lỗi mạng:", error);
        }
      };

      // 3. Logic Đồng bộ dữ liệu
      const handleSyncToServer = async () => {
        const payload = gridRef.value?.changedPayload || [];
        console.log('Dữ liệu gửi lên Golang:', payload);
        alert('Kiểm tra console trình duyệt để xem ' + payload.length + ' bản ghi!');
        await fetchData();
      };

      // 4. Hook chạy ngay sau khi trang tải xong
      onMounted(async () => {
        await fetchTuan();
        await fetchMonHoc();
        fetchData();
      });

      // 5. BẮT BUỘC RETURN TẤT CẢ BIẾN ĐƯỢC GỌI TRONG HTML
      return {
        gridRef,
        week,               // Nếu thiếu, dropdown tuần sẽ hỏng
        scheduleColumns,
        scheduleData,       // Nếu thiếu, toàn bộ datagrid sẽ crash
        fetchData,
        handleSyncToServer
      };
    }
  });

  // Đăng ký component toàn cục và mount vào DOM
  app.component('datagrid', DataGrid);
  app.mount('#app');
</script>
{{end}}
