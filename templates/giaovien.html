{{define "content"}}
<div id="thong-tin-app" class="p-6 bg-gray-50 min-h-screen">
    <div class="max-w-7xl mx-auto">
    <div class="flex flex-col md:flex-row justify-between items-center mb-6 gap-4">
        <div class="block w-full flex items-center gap-3">
          <h2 class="text-2xl font-bold text-gray-800">Danh Sách Giáo Viên</h2>
        </div>
        <div class="flex items-center gap-3 w-full">
          <table class="table-auto w-full">
            <thead>
              <tr>
                <th class="px-4 py-2 text-left text-sm font-medium text-gray-900 whitespace-nowrap">Mã</th>
                <th class="px-4 py-2 text-left text-sm font-medium text-gray-900 whitespace-nowrap">Tên TKB</th>
                <th class="px-4 py-2 text-left text-sm font-medium text-gray-900 whitespace-nowrap">Họ và tên</th>
                <th class="px-4 py-2 text-left text-sm font-medium text-gray-900 whitespace-nowrap">Môn dạy</th>
                <th class="px-4 py-2 text-left text-sm font-medium text-gray-900 whitespace-nowrap">Lớp</th>
                <th class="px-4 py-2 text-left text-sm font-medium text-gray-900 whitespace-nowrap">Thao tác</th>
              </tr>
            </thead>
            <tbody>
              <tr v-for="(gv, index) in danhSachGV" :key="gv.ma" class="border-b border-gray-200 hover:bg-gray-100 transition-colors duration-300">
                <td class="px-4 py-2 text-sm font-medium text-gray-900">[[ gv.ma ]]</td>
                <td class="px-4 py-2 text-sm font-medium text-gray-900">[[ gv.tenTKB ]]</td>
                <td class="px-4 py-2 text-sm font-medium text-gray-900">[[ gv.hoTen ]]</td>
                <td class="px-4 py-2 text-sm font-medium text-gray-900">[[ gv.monDay ]]</td>
                <td class="px-4 py-2 text-sm font-medium text-gray-900">[[ gv.lopDay ]]</td>
                <td class="px-4 py-2 text-sm font-medium text-gray-900">
                  <button @click="openEditModal(index)" class="text-sm text-yellow-600 hover:text-yellow-800 bg-yellow-50 hover:bg-yellow-100 px-3 py-1.5 rounded transition">
                    Sửa
                  </button>
                  <button @click="deleteGV(index)" class="text-sm text-red-600 hover:text-red-800 bg-red-50 hover:bg-red-100 px-3 py-1.5 rounded transition">
                    Xóa
                  </button>
                </td>
              </tr>
            </tbody>
            <tfoot>
              <tr>
                <td colspan="7" class="px-4 py-2 text-sm font-medium text-gray-900 whitespace-nowrap">
                  <button @click="openAddModal" class="bg-blue-600 hover:bg-blue-700 text-white font-medium py-2 px-4 rounded-lg shadow-sm transition flex items-center gap-2">
                    <!-- Icon Plus -->
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6v6m0 0v6m0-6h6m-6 0H6"></path></svg>
                    Thêm Giáo Viên
                  </button>
                </td>
              </tr> 
            </tfoot>  
          </table>
        </div>
      </div>
        
    
    <!-- Modal Form (Thêm/Sửa) -->
    <div v-if="showModal" class="fixed inset-0 bg-black/50 flex items-center justify-center z-50 p-4">
        <div class="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden">
            <!-- Header Modal -->
            <div class="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                <h3 class="text-lg font-bold text-gray-800">
                    [[ isEdit ? 'Sửa thông tin Giáo viên' : 'Thêm Giáo viên mới' ]]
                </h3>
                <button @click="closeModal" class="text-gray-400 hover:text-gray-600 font-bold text-xl">&times;</button>
            </div>
            
            <!-- Body Modal (Form) -->
            <div class="p-6 space-y-4">
                <div class="grid grid-cols-2 gap-4">
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Mã GV *</label>
                        <input v-model="form.ma" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: GV001">
                    </div>
                    <div>
                        <label class="block text-sm font-medium text-gray-700 mb-1">Tên TKB *</label>
                        <input v-model="form.tenTKB" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: KienL">
                    </div>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1">Họ và tên *</label>
                    <input v-model="form.hoTen" type="text" class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500" placeholder="VD: Lâm Kiên">
                </div>
            </div>
            
            <!-- Footer Modal -->
            <div class="px-6 py-4 bg-gray-50 border-t border-gray-100 flex justify-end gap-3">
                <button @click="closeModal" class="px-4 py-2 text-gray-700 bg-white border border-gray-300 rounded-md hover:bg-gray-50 transition">Hủy</button>
                <button @click="saveGV" class="px-4 py-2 text-white bg-blue-600 rounded-md hover:bg-blue-700 transition">
                    [[ isEdit ? 'Cập nhật' : 'Lưu dữ liệu' ]]
                </button>
            </div>
        </div>
    </div>
</div>
<!-- Script -->
<script>
    const { createApp, ref, reactive,onMounted } = Vue

    createApp({
        delimiters: ['[[', ']]'],
        setup() {
            // Dữ liệu danh sách giáo viên
            const danhSachGV = ref([
                { ma: "GV001", hoTen: "Lâm Kiên", tenTKB: "KienL", monDay: "Tin học, GDĐP", lopDay: "12A1, 12A2" },
                { ma: "GV002", hoTen: "Nguyễn Minh An", tenTKB: "AnNM", monDay: "Toán, Trai nghiệp", lopDay: "10A1, 12C1" }
            ])

            // Quản lý trạng thái Modal Form
            const showModal = ref(false)
            const isEdit = ref(false)
            const editIndex = ref(-1)

            // Object lưu trữ dữ liệu của Form
            const form = reactive({
                ma: '',
                hoTen: '',
                tenTKB: '',
              })

            // Hàm mở Modal để Thêm mới
            const openAddModal = () => {
                isEdit.value = false
                resetForm()
                showModal.value = true
            }

            // Hàm mở Modal để Sửa thông tin
            const openEditModal = (index) => {
                isEdit.value = true
                editIndex.value = index
                const gv = danhSachGV.value[index]
                
                // Đổ dữ liệu vào form, nối mảng lớp thành chuỗi để hiển thị vào input
                form.ma = gv.ma
                form.hoTen = gv.hoTen
                form.tenTKB = gv.tenTKB
                
                showModal.value = true
            }

            // Hàm đóng Modal
            const closeModal = () => {
                showModal.value = false
            }

            // Hàm Reset Form
            const resetForm = () => {
                form.ma = ''
                form.hoTen = ''
                form.tenTKB = ''
            }
            const fetchGV = async () => {
                try {
                  let url = `/api/giaovien`
                  const res = await fetch(url)
                  if (res.ok) {
                    danhSachGV.value = await res.json()
                  } else {
                    alert('Lỗi khi lấy dữ liệu!')
                  }
                } catch (err){
                  console.error("Lỗi:",err)
                }
            }
            onMounted(() => {
              fetchGV()
            })
            // Hàm Lưu (Dùng chung cho cả Thêm và Sửa)
            const saveGV = async () => {
                // Ràng buộc nhập liệu cơ bản
                if(!form.ma || !form.hoTen || !form.tenTKB) {
                    alert('Vui lòng nhập các trường bắt buộc (*)')
                    return
                }
                
                const newData = {
                    ma: form.ma,
                    hoTen: form.hoTen,
                    tenTKB: form.tenTKB,
                }
                try {
                  let url = '/api/giaovien'
                  const method = isEdit.value ? 'PUT' : 'POST'
                  const res = await fetch(url, {
                    method: method,
                    headers: {
                      'Content-Type': 'application/json'
                    },
                    body: JSON.stringify(newData)
                  })
                  if (res.ok) {
                    if (isEdit.value) {
                      // Cập nhật phần tử tại vị trí editIndex
                      danhSachGV.value[editIndex.value] = newData
                    } else {
                      // Thêm phần tử mới vào danh sách
                      danhSachGV.value.push(newData)
                    }
                    closeModal()
                  } else {
                    alert('Lỗi khi lưu thông tin!')
                  }
                } catch (err){
                  console.error("Lỗi:",err)
                }
            }

            // Hàm Xóa Giáo Viên
            const deleteGV = async (index) => {
                if(confirm('Bạn có chắc chắn muốn xóa dữ liệu giáo viên này?')) {
                    const magv = danhSachGV.value[index].ma
                    try {
                      let url = `/api/giaovien/${magv}`
                      let method = 'DELETE'
                      const res = await fetch(url, {
                        method: method,
                        headers: {
                          'Content-Type': 'application/json'
                        }
                      })
                      if (res.ok) {
                        danhSachGV.value.splice(index, 1) // Xóa 1 phần tử tại vị trí index
                      } else {
                        alert('Lỗi khi xóa thông tin!')
                      }
                    } catch (err){
                      console.error("Lỗi:",err)
                    }
                }
            }

            return {
                danhSachGV,
                showModal, isEdit, form,
                openAddModal, openEditModal, closeModal, saveGV, deleteGV
            }
        }
    }).mount('#thong-tin-app')
</script>
{{end}}
