<!DOCTYPE html>
<html lang="vi">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Phần mềm hỗ trợ xếp thời khóa biểu</title>
        <link rel="stylesheet" href="/static/css/style.css">
    </head>
    <body>
        <header>
            <h2>Quản lý giáo viên</h1>
            <nav>
                <a href="/">Trang chủ</a>
            </nav>
        </header>
        <main>
            <h3 id="title">Danh sách giáo viên</h2>
            <div id="input_div" style="display: none;">
                <form id="giaovien_form">
                    <input type="hidden" id="form_edit">
                    <input type="text" id="ma_giao_vien" placeholder="Mã Giáo Viên">
                    <input type="text" id="ho_ten" placeholder="Ho Tên Giao Viên" required>
                    <input type="text" id="ten_tkb"placeholder="Tên viết tắt" required>
                    <button class="button" type="submit">Lưu Giáo Viên</button>
                </form>
            </div>
            <div id="upload_div" style="display: none;">
                <form id="upload_form" enctype="multipart/form-data" >
                    <input type="file" id="fileInput" name="file" accept=".xlsx">
                    <button class="button" type="submit">Upload</button>
                </form>
            </div>
            <div id="view_div" class="show">
                <table class="table">
                    <thead>
                        <tr>
                            <th>Mã giáo viên</th>
                            <th>Họ tên giáo viên</th>
                            <th>Tên viêt tắt</th>
                            <th>Hành động</th>
                        </tr>
                    </thead>
                    <tbody id="BangGiaoVien"></tbody>
                </table>
            </div>
            <div id="control_div">
                <button class="button" id="append">Thêm mưới giáo viên</button>
                <button class="button" id="import">Upload giáo viên từ tệp excel</button>
                <button class="button" id="export">Export giáo viên từ tệp excel</button>
            </div>
            <div id="dialog_div">
                <p id="message"></p>
            </div>
        </main>
        <script src="/static/js/script_giaovien.js"></script>
    </body>
</html>
