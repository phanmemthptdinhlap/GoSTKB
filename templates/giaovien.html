{{define "content"}}
<div id="app">
  <h1 style="color: #333; margin-bottom: 20px;">Danh sách giao viên</h1>
  <datasheet
      :labels="labels"
      :datas="datas"
      @sync="syncData">
  </datasheet>
</div>

<script src="static/datasheet.js"></script>
<script>
  const { createApp, ref, onMounted } = Vue;

  const app = createApp({
    setup() {
      const labels = ref([
        { key: 'id', title: 'Mã giáo viên', type: 'hidden' }, // Ẩn cột này đi
        { key: 'ten_ngan', title: 'Tên viết tắt (Tên TKB)', type: 'text' },
        { key: 'ho_ten', title: 'Họ và tên', type: 'text' },
        { key: 'mon_chinh_id', title: 'Môn chính', type: 'select', options: [] } // Sẽ nạp động dữ liệu vào đây
      ]);
      
      const datas = ref([]);

      // Nạp danh sách giáo viên
      const fetchData = async () => {
        try {
          const response = await fetch('/api/giaovien');
          if (response.ok) {
            datas.value = await response.json() || [];
          }
        } catch (error) {
          console.error("Lỗi mạng:", error);
        }
      };

      // Nạp danh sách môn học để làm menu xổ xuống (Dropdown)
      const fetchMonHoc = async () => {
        try {
          const response = await fetch('/api/monhoc');
          if (response.ok) {
            const monhocs = await response.json() || [];
            // Chuyển đổi dữ liệu môn học thành dạng { value: id, text: ten_mon }
            const monHocOptions = monhocs.map(m => ({
              value: m.id,
              text: m.ten_mon
            }));
            
            // Đổ vào mảng options của nhãn mon_chinh_id
            const lbl = labels.value.find(l => l.key === 'mon_chinh_id');
            if (lbl) lbl.options = monHocOptions;
          }
        } catch (error) {
          console.error("Lỗi lấy danh sách môn học:", error);
        }
      };

      const syncData = async (updatedData) => {
        const dataToSend = updatedData.filter(item => item.action !== ' ');
        if (dataToSend.length === 0) {
          alert('Chưa có thay đổi nào để đồng bộ!');
          return;
        }

        try {
          const response = await fetch('/api/giaovien/sync', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(dataToSend)
          });

          if (response.ok) {
            alert('Đồng bộ thành công!');
            await fetchData();
          } else {
            alert("Đã xảy ra lỗi trong quá trình đồng bộ.");
          }
        } catch (error) {
          alert("Không thể kết nối đến máy chủ!");
        }
      };

      onMounted(() => {
        // Chạy song song 2 luồng tải dữ liệu
        fetchMonHoc();
        fetchData();
      });

      return {
        labels,
        datas,
        syncData
      };
    }
  });

  app.component('datasheet', DataSheet);
  app.mount('#app');
</script>
{{end}}
