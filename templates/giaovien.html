
{{ template "header.html" }}
    <div id="app" class="container mt-4">
        <h2 class="mb-4">Quản lý giáo viên</h2>
        
        <!-- Form thêm/sửa giáo viên -->
        <div class="card mb-4" v-if="isVisible">
            <div class="card-body">
                <h5 class="card-title" v-text="formTitle"></h5>
                <div class="mb-3">
                    <label class="form-label">Mã giáo viên</label>
                    <input type="text" class="form-control" v-model="formData.ma_giao_vien">
                </div>
                <div class="mb-3">
                    <label class="form-label">Họ và tên</label>
                    <input type="text" class="form-control" v-model="formData.ho_ten" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên trên TKB</label>
                    <input type="text" class="form-control" v-model="formData.ten_tkb" required>
                </div>
                <button @click="saveGiaoVien" class="btn btn-primary">Lưu</button>
                <button @click="resetForm" class="btn btn-secondary ms-2">Hủy</button>
            </div>
        </div>

        <!-- Bảng danh sách giáo viên -->
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-3">
                    <h5 class="card-title">Danh sách giáo viên</h5>
                    <div>
                        <button @click="newTeacher" class="btn btn-primary me-2">Thêm mới giáo viên</button>
                        <label class="btn btn-info me-2">
                            Nhập Excel
                            <input type="file" @change="importExcel" class="d-none" accept=".xlsx,.xls">
                        </label>
                        <button @click="exportExcel" class="btn btn-success">Xuất Excel</button>
                    </div>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Mã GV</th>
                            <th>Họ và tên</th>
                            <th>Tên trên TKB</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="gv in danhSachGiaoVien" :key="gv.ma_giao_vien">
                            <td v-text="gv.ma_giao_vien"></td>
                            <td v-text="gv.ho_ten"></td>
                            <td v-text="gv.ten_tkb"></td>
                            <td>
                                <button @click="editGiaoVien(gv)" class="btn btn-sm btn-warning me-2">Sửa</button>
                                <button @click="deleteGiaoVien(gv.ma_giao_vien)" class="btn btn-sm btn-danger">Xóa</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script type="module">
        import { createVueApp } from '/static/js/vue-config.js';

        createVueApp({
            data() {
                return {
                    danhSachGiaoVien: [],
                    formData: {
                        ma_giao_vien: '',
                        ho_ten: '',
                        ten_tkb: ''
                    },
                    isVisible: false,
                    isEditing: false
                }
            },
            computed: {
                formTitle() {
                    return this.isEditing ? 'Sửa thông tin giáo viên' : 'Thêm giáo viên mới';
                }
            },
            methods: {
                // Lấy danh sách giáo viên
                async loadDanhSachGiaoVien() {
                    try {
                        const response = await axios.get('/api/giaovien');
                        this.danhSachGiaoVien = response.data;
                    } catch (error) {
                        this.$toast.error(this.getErrorMessage(error));
                    }finally
                    {
                        this.$toast.success("Tải xong danh sách giáo viên!");
                    }
                },

                // Lưu giáo viên (thêm mới hoặc cập nhật)
                async saveGiaoVien() {
                    try {
                        if (this.isEditing) {
                            await axios.put(`/api/giaovien/${this.formData.ma_giao_vien}`, this.formData);
                        } else {
                            await axios.post('/api/giaovien', this.formData);
                        }
                        if (response.status===200||response.status===201){
                            this.$toast.success(this.getInfoMessage(response));
                            this.loadDanhSachGiaoVien();
                            this.resetForm();
                        }else{
                            throw new Error (`${response.data?.error}`);
                        }

                    } catch (error) {
                        this.$toast.error(this.getErrorMessage(error));
                    }
                },

                // Xóa giáo viên
                async deleteGiaoVien(id) {
                    if (confirm('Bạn có chắc muốn xóa giáo viên này?')) {
                        try {
                            await axios.delete(`/api/giaovien/${id}`)
                            if(response.status===200||response.status===201){
                                this.$toast.success(this.getInfoMessage(response));
                                this.loadDanhSachGiaoVien()
                            }
                        } catch (error) {
                            this.$toast.error(this.getErrorMessage(error));
                        }
                    }
                },

                // Chuẩn bị form để sửa
                editGiaoVien(gv) {
                    this.formData = { ...gv }
                    this.isEditing = true
                    this.isVisible = true
                },

                // Reset form về trạng thái ban đầu
                resetForm() {
                    this.formData = {
                        ma_giao_vien: '',
                        ho_ten: '',
                        ten_tkb: ''
                    }
                    this.isVisible = false
                    this.isEditing = false
                },

                newTeacher(){
                    this.resetForm()
                    this.isVisible = true
                },
                // Xuất Excel
                async exportExcel() {
                    try {
                        const response = await axios.get('/api/export/giaovien', {
                            responseType: 'blob'
                        })
                        const url = window.URL.createObjectURL(new Blob([response.data]))
                        const link = document.createElement('a')
                        link.href = url
                        link.setAttribute('download', 'danh_sach_giao_vien.xlsx')
                        document.body.appendChild(link)
                        link.click()
                        link.remove()
                    } catch (error) {
                        this.$toast.error(this.getErrorMessage(error));
                    }
                },

                // Nhập Excel
                async importExcel(event) {
                    const file = event.target.files[0]
                    if (!file) return

                    const formData = new FormData()
                    formData.append('file', file)

                    try {
                        const response = await axios.post('/api/import/giaovien', formData)
                        if(response.status===200||response.status===201){
                            const mess=`Nhập dữ liệu thành công!\nĐã cập nhật: ${response.data.updated}\nĐã thêm mới: ${response.data.inserted}`;
                            this.$toast.success(mess);
                            this.loadDanhSachGiaoVien();
                        }
                    } catch (error) {
                        this.$toast.error(this.getErrorMessage(error));
                    }
                    event.target.value = '' // Reset input file
                },
                            // Hàm xử lý thông báo lỗi
                getErrorMessage(error) {
                    return `Lỗi: ${error.response?.data?.error || error.message || 'Không xác định'}`;
                },
                getInfoMessage(response) {
                    return `Thông báo: ${response?.data?.message || response?.message || 'Không có thông tin'}`;
                }
            },
            mounted() {
                this.loadDanhSachGiaoVien()
            }
        }).mount('#app')
</script>
{{ template "footer.html"}}
