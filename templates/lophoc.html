
{{ template "header.html" }}
    <div id="app" class="container mt-4">
        <h2 class="mb-4">Quản lý lớp học</h2>
        
        <!-- Form thêm/sửa lớp học -->
        <div class="card mb-4" v-if="isVisible">
            <div class="card-body">
                <h5 class="card-title" v-text="formTitle"></h5>
                <div class="mb-3">
                    <label class="form-label">Mã lớp học</label>
                    <input type="text" class="form-control" v-model="formData.ma_lop_hoc">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên lớp học</label>
                    <input type="text" class="form-control" v-model="formData.ten_lop" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Khối lớp</label>
                    <input type="text" class="form-control" v-model="formData.khoi_lop" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Giáo viên chủ nhiệm</label>
                    <select id="listbox" class="form-control" v-model="formData.ma_giao_vien">
                        <option v-for="gv in giaovien" :key="gv.ma_giao_vien" :value="gv.ho_ten" v-text="gv.ho_ten">
                        </option>
                    </select>
                </div>
                <button @click="savelophoc" class="btn btn-primary">Lưu</button>
                <button @click="resetForm" class="btn btn-secondary ms-2">Hủy</button>
            </div>
        </div>

        <!-- Bảng danh sách giáo viên -->
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-3">
                    <h5 class="card-title">Danh sách lớp học</h5>
                    <div>
                        <button @click="newClass" class="btn btn-primary me-2">Thêm mới lớp học</button>
                        <label class="btn btn-info me-2">
                            Nhập Excel
                            <input type="file" @change="importExcel" class="d-none" accept=".xlsx,.xls">
                        </label>
                        <button @click="exportExcel" class="btn btn-success">Xuất Excel</button>
                    </div>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Mã lớp học</th>
                            <th>Tên lớp học</th>
                            <th>Khối lớp</th>
                            <th>Giáo viên chủ nhiệm</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="lop in dslop" :key="lop.ma_lop_hoc">
                            <td v-text="lop.ma_lop_hoc"></td>
                            <td v-text="lop.ten_lop"></td>
                            <td v-text="lop.khoi_lop"></td>
                            <td v-text="lop.ten_chu_nhiem"></td>
                            <td>
                                <button @click="editLopHoc(lop)" class="btn btn-sm btn-warning me-2">Sửa</button>
                                <button @click="deleteLopHoc(lop.ma_lop_hoc)" class="btn btn-sm btn-danger">Xóa</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        const { createApp } = Vue

        createApp({
            data() {
                return {
                    dslop: [],
                    dsgiaovien:[],
                    formData: {
                        ma_lop_hoc: '',
                        ten_lop: '',
                        khoi_lop: '',
                        ma_chu_nhiem: '',
                        ten_chu_nhiem:''
                    },
                    isVisible: false,
                    isEditing: false
                }
            },
            computed: {
                formTitle() {
                    return this.isEditing ? 'Sửa thông tin lớp học' : 'Thêm lớp học mới'
                }
            },
            methods: {
                // Lấy danh sách giáo viên
                async loadDanhSachLopHoc() {
                    try {
                        const response = await axios.get('/api/lophoc')
                        this.dslop = response.data
                    } catch (error) {
                        alert(`Không thể tải danh sách lớp học${error}`)
                    }
                },
                async loadDanhSachGiaoVien(){
                    try{
                        const response = await axios.get('/api/giaovien')
                        this.dsgiaovien = response.data
                    } catch (error){
                        alert(`Không thể tải dánh sách giáo viên${error}`)
                    }
                },
                // Lưu giáo viên (thêm mới hoặc cập nhật)
                async saveLopHoc() {
                    try {
                        if (this.isEditing) {
                            await axios.put(`/api/lophoc${this.formData.ma_lop_hoc}`, this.formData)
                        } else {
                            await axios.post('/api/lophoc', this.formData)
                        }
                        this.loadDanhSachLopHoc()
                        this.resetForm()
                    } catch (error) {
                        alert('Không thể lưu thông tin lớp<input type="text" class="form-control" v-model="formData.khoi_lop" required>')
                    }
                },

                // Xóa giáo viên
                async deleteLopHoc(id) {
                    if (confirm('Bạn có chắc muốn xóa lớp này?')) {
                        try {
                            await axios.delete(`/api/lophoc/${id}`)
                            this.loadDanhSachLopHoc()
                        } catch (error) {
                            alert('Không thể xóa lớp')
                        }
                    }
                },

                // Chuẩn bị form để sửa
                editLopHoc(lop) {
                    this.formData = { ...lop }
                    this.isEditing = true
                    this.isVisible = true
                },

                // Reset form về trạng thái ban đầu
                resetForm() {
                    this.formData = {
                        ma_lop_hoc: '',
                        ten_lop: '',
                        khoi_lop: '',
                        ma_chu_nhiem: '',
                        ten_chu_nhiem:'',
                    }
                    this.isVisible = false
                    this.isEditing = false
                },

                newClass(){
                    this.resetForm()
                    this.isVisible = true
                },
                // Xuất Excel
                async exportExcel() {
                    try {
                        const response = await axios.get('/api/export/lophoc', {
                            responseType: 'blob'
                        })
                        const url = window.URL.createObjectURL(new Blob([response.data]))
                        const link = document.createElement('a')
                        link.href = url
                        link.setAttribute('download', 'danh_sach_lop_hoc.xlsx')
                        document.body.appendChild(link)
                        link.click()
                        link.remove()
                    } catch (error) {
                        alert('Không thể xuất file Excel')
                    }
                },

                // Nhập Excel
                async importExcel(event) {
                    const file = event.target.files[0]
                    if (!file) return

                    const formData = new FormData()
                    formData.append('file', file)

                    try {
                        const response = await axios.post('/api/import/lophoc', formData)
                        alert(`Nhập dữ liệu thành công!\nĐã cập nhật: ${response.data.updated}\nĐã thêm mới: ${response.data.inserted}`)
                        this.loadDanhSachLopHoc()
                    } catch (error) {
                        alert('Không thể nhập file Excel')
                    }
                    event.target.value = '' // Reset input file
                }
            },
            mounted() {
                this.loadDanhSachLopHoc()
            }
        }).mount('#app')
</script>
{{ template "footer.html"}}
