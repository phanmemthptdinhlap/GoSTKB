{{define "content"}}
<script src="/static/datasheet.js"></script>
<div id = "app">
  <h1>Danh sách lớp học</h1>
  <datasheet
      :labels="labels"
      :datas="datas"
      @sync="syncData"
  ></datasheet>
</div>
<script>
  const {ref, onMounted, reactive} = Vue
  const app = Vue.createApp({
    components: { DataSheet},
    setup() {
      // Khai báo các thông số cần thiết cho table-view
      const title = ref('Danh sách lớp học')
      const labels = ref([
        {label: 'Mã lớp học', key: 'ma',type:'text'},
        {label: 'Tên lớp học', key: 'ten',type:'text'},
        {label: 'GVCN', key: 'gvcn',type:'text'},
      ])
      const datas = ref([])
      const syncData = async (data,callback) => {
        if (!data.ma||!data.ten||!data.gvcn) {
          if (callback) callback({success:false, message:'Mã lớp học, tên lớp học, GVCN không được bỏ trống'});
          return
        }
        const newData = {
          ma: data.ma,
          ten: data.ten,
          gvcn: data.gvcn,
        }
        try {
          const response = await fetch('/api/lophoc', {
            method: isEdit.value ? 'PUT' : 'POST',
            headers: {
              'Content-Type': 'application/json',
            },
            body: JSON.stringify(newData),
          })
          if (response.ok) {
            if (callback) callback({success:true, message: isEdit.value ? 'Cập nhật thành công' : 'Thêm thành công'})
            fetchData()
          } else {
            if (callback) callback({success:false, message: 'Không thể kết nối tới server'})
          }
        } catch (error) {
          if (callback) callback({success:false, message: error.message})
        }
        isEdit.value = false
        form.value.closeModal()
        fetchData()
      }
      const fetchData = async () => {
        try {
          const response = await fetch('/api/lophoc')
          if (response.ok) {
            const data = await response.json()
            datas.value = data
          } else {
            alert('Không thể kết nối tới server')
          }
        } catch (error) {
          alert('Không thể kết nối tới server', error)
        }
      }
      onMounted(() => {
        fetchData()
      })
      return {
        form,
        title,
        subTitle,
        labels,
        datas,
        showAction,
        handleAddItems,
        handleUpdateItems,
        handleDeleteItems,
        handleSaveData,
      }
    }
  })
  app.component('datasheet', DataSheet)
  app.mount('#app')
</script>
{{end}}
