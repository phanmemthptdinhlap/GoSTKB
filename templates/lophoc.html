
{{ template "header.html" }}
    <div id="app" class="container mt-4">
        <h2 class="mb-4">Quản lý lớp học</h2>
        
        <!-- Form thêm/sửa lớp học -->
        <div class="card mb-4" v-if="isVisible">
            <div class="card-body">
                <h5 class="card-title" v-text="formTitle"></h5>
                <div class="mb-3">
                    <label class="form-label">Mã lớp học</label><br>
                    <input type="text" class="form-control-sm" v-model="formData.ma_lop">
                </div>
                <div class="mb-3">
                    <label class="form-label">Tên lớp học</label><br>
                    <input type="text" class="form-control-sm" v-model="formData.ten_lop" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Khối lớp</label><br>
                    <input type="text" class="form-control-sm" v-model="formData.khoi_lop" required>
                </div>
                <div class="mb-3">
                    <label class="form-label">Giáo viên chủ nhiệm</label><br>
                    <select v-model="formData.ma_chu_nhiem" class="form-control-sm" :disabled="loading" >
                        <option 
                            v-for="gv in dsgiaovien" 
                            :key="gv.ma_giao_vien"
                            :value="gv.ma_giao_vien"
                            :selected="gv.ma_giao_vien===formData.ma_chu_nhiem" 
                            v-text="gv.ho_ten"
                            >
                        </option>
                    </select>
                </div>
                <button @click="saveLopHoc" class="btn btn-primary">Lưu</button>
                <button @click="resetForm" class="btn btn-secondary ms-2">Hủy</button>
            </div>
        </div>

        <!-- Bảng danh sách lớp học -->
        <div class="card">
            <div class="card-body">
                <div class="d-flex justify-content-between mb-3">
                    <h5 class="card-title">Danh sách lớp học</h5>
                    <div>
                        <button @click="newClass" class="btn btn-primary me-2">Thêm mới lớp học</button>
                        <label class="btn btn-info me-2">
                            Nhập Excel
                            <input type="file" @change="importExcel" class="d-none" accept=".xlsx,.xls">
                        </label>
                        <button @click="exportExcel" class="btn btn-success">Xuất Excel</button>
                    </div>
                </div>
                <table class="table">
                    <thead>
                        <tr>
                            <th>Mã lớp học</th>
                            <th>Tên lớp học</th>
                            <th>Khối lớp</th>
                            <th>Giáo viên chủ nhiệm</th>
                            <th>Thao tác</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr v-for="lop in dslop" :key="lop.ma_lop">
                            <td v-text="lop.ma_lop"></td>
                            <td v-text="lop.ten_lop"></td>
                            <td v-text="lop.khoi_lop"></td>
                            <td v-text="lop.ten_chu_nhiem"></td>
                            <td>
                                <button @click="editLopHoc(lop)" class="btn btn-sm btn-warning me-2">Sửa</button>
                                <button @click="deleteLopHoc(lop.ma_lop)" class="btn btn-sm btn-danger">Xóa</button>
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

<script type="module">
    import { createVueApp } from '/static/js/vue-config.js';

    const app = createVueApp({
        data() {
            return {
                dslop: [],
                dsgiaovien: [],
                formData: {
                    ma_lop: '',
                    ten_lop: '',
                    khoi_lop: '',
                    ma_chu_nhiem: '',
                    ten_chu_nhiem: ''
                },
                isVisible: false,
                isEditing: false,
            };
        },
        computed: {
            formTitle() {
                return this.isEditing ? 'Sửa thông tin lớp học' : 'Thêm lớp học mới';
            }
        },
        methods: {
            // Lấy danh sách lớp học
            async loadDanhSachLopHoc() {
                try {
                    const response = await axios.get('/api/lophoc');
                    this.dslop = response.data;
                } catch (error) {
                    this.$toast.error(this.getErrorMessage(error));
                } finally {
                    
                }
            },

            // Lấy danh sách giáo viên
            async loadDanhSachGiaoVien() {
                try {
                    const response = await axios.get('/api/giaovien');
                    this.dsgiaovien = response.data;
                } catch (error) {
                    this.$toast.error(this.getErrorMessage(error));
                } finally {
             
                }
            },

            // Lưu lớp học
            async saveLopHoc() {
                try {
                    let response;
                    
                    if (!this.formData.ten_lop || !this.formData.khoi_lop) {
                        throw new Error('Vui lòng điền đầy đủ thông tin');
                    }
                    if (this.isEditing) {
                        response = await axios.put(`/api/lophoc/${this.formData.ma_lop}`, this.formData);
                    } else {
                        response = await axios.post('/api/lophoc', this.formData);
                    }

                    if (response.status === 200 || response.status === 201) {
                        this.$toast.success(this.getInfoMessage(response));
                        await this.loadDanhSachLopHoc();
                        this.resetForm();
                    } else {
                        throw new Error(response.data?.error || 'Lỗi không xác định');
                    }
                } catch (error) {
                    this.$toast.error(this.getErrorMessage(error));
                } finally {

                }
            },

            // Xóa lớp học
            async deleteLopHoc(id) {
                if (!confirm('Bạn có chắc muốn xóa lớp này?')) return;
                try {
                    const response = await axios.delete(`/api/lophoc/${id}`);
                    
                    if (response.status === 200) {
                        this.$toast.success(this.getInfoMessage(response));
                        await this.loadDanhSachLopHoc();
                    } else {
                        throw new Error(response.data?.error || 'Lỗi không xác định');
                    }
                } catch (error) {
                    this.$toast.error(this.getErrorMessage(error));
                } finally {

                }
            },

            // Sửa lớp học
            editLopHoc(lop) {
                this.formData = { ...lop };
                this.isEditing = true;
                this.isVisible = true;
            },

            // Reset form
            resetForm() {
                this.formData = {
                    ma_lop: '',
                    ten_lop: '',
                    khoi_lop: '',
                    ma_chu_nhiem: '',
                    ten_chu_nhiem: ''
                };
                this.isVisible = false;
                this.isEditing = false;
            },

            // Thêm mới lớp
            newClass() {
                this.resetForm();
                this.isVisible = true;
            },

            // Xuất Excel
            async exportExcel() {
                try {
                    const response = await axios.get('/api/export/lophoc', {
                        responseType: 'blob'
                    });
                    const url = window.URL.createObjectURL(new Blob([response.data]));
                    const link = document.createElement('a');
                    link.href = url;
                    link.setAttribute('download', 'danh_sach_lop_hoc.xlsx');
                    document.body.appendChild(link);
                    link.click();
                    link.remove();
                } catch (error) {
                    this.$toast.error(this.getErrorMessage(error));
                } finally {
                    
                }
            },

            // Nhập Excel
            async importExcel(event) {
                const file = event.target.files[0];
                if (!file) return;
                try {
                    const formData = new FormData();
                    formData.append('file', file);
                    const response = await axios.post('/api/import/lophoc', formData);
                    this.$toast.success(`Nhập dữ liệu thành công!\nĐã cập nhật: ${response.data?.updated}\nĐã thêm mới: ${response.data?.inserted}`);
                    await this.loadDanhSachLopHoc();
                } catch (error) {
                    this.$toast.error(this.getErrorMessage(error));
                } finally {
                    event.target.value = ''; // Reset input file
                }
            },

            // Hàm xử lý thông báo lỗi
            getErrorMessage(error) {
                return `Lỗi: ${error.response?.data?.error || error.message || 'Không xác định'}`;
            },
            getInfoMessage(response) {
                return `Thông báo: ${response?.data?.message || response?.message || 'Không có thông tin'}`;
            }
        },
        async mounted() {
            try {
                await Promise.all([
                    this.loadDanhSachLopHoc(),
                    this.loadDanhSachGiaoVien()
                ]);
            } catch (error) {
                this.$toast.error(this.getErrorMessage(error));
            } finally {
                this.$toast.success("Hoàn thành tải dữ liệu");
            }
        }
    });

    app.mount('#app');
</script>
