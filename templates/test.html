{{define "content"}}
<div id="app">
  <h1 style="color: #333; margin-bottom: 20px;" v-text="'Tuần được chọn mặc định: ' + tuan"></h1>
  <h1 style="color: #333; margin-bottom: 20px;">Danh sách chi tiết tuẩn</h1>
  <h2 style="color: #333; margin-bottom: 20px;"v-text="datas"></h2>
  
</div>
<script>
  const { createApp, ref, onMounted } = Vue;

  const app = createApp({
    setup() {
      const tuan = ref(0);
      const datas = ref([]);
      // Đã cập nhật key khớp chuẩn với JSON từ Golang trả về (ma, ten, gvcn)
      const fetchTuan = async () => {
        try {
          const response = await fetch('/api/chitiet/tuan'); // Tuần mặc định
          if (response.ok) {
            const result = await response.json();
            // Gán dữ liệu server vào datas. Component datasheet sẽ tự động map thêm action 'none'
            tuan.value = result;
          } else {
            alert("Lỗi khi tải dữ liệu từ máy chủ");
          }
        } catch (error) {
          console.error("Lỗi mạng:", error);
        }
      };
      const fetchData = async () => {
        try {
          alert("Tuần mặc định: " + tuan.value);
          const response = await fetch('/api/chitiet/'+tuan.value); // Tuần mặc định
          if (response.ok) {
            const result = await response.json();
            // Gán dữ liệu server vào datas. Component datasheet sẽ tự động map thêm action 'none'
            alert(result);
            datas.value = result || [];
          } else {
            alert("Lỗi khi tải dữ liệu từ máy chủ");
          }
        } catch (error) {
          console.error("Lỗi mạng:", error);
        }
      };
      
          // Khi giao diện vừa render xong thì tự động gọi lấy dữ liệu ngay
      onMounted(async () => {
        await fetchTuan();
        fetchData();
      });

      return {
       tuan,
        datas
      };
    }
  });
  app.mount('#app');
</script>
{{end}}
